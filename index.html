<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Square Root Calendar</title>
<meta name="description" content="Square Root Calendar is temporarily unavailable.">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#f4f1ea">
<style>
  :root{ color-scheme: light dark; }
  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{ margin:0; min-height:100dvh; display:grid; place-items:center; padding:24px;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",Roboto,sans-serif;
    background:#f4f1ea; color:#1b1712; text-align:center; -webkit-font-smoothing:antialiased; }
  @media (prefers-color-scheme:dark){ body{ background:#131110; color:#f2ede4; } }
  .card{ max-width:430px; }
  .mark{ width:66px; height:66px; margin:0 auto 22px; border-radius:19px; display:grid; place-items:center;
    background:linear-gradient(150deg,#d21f2d,#9b1620); color:#fff; font-size:35px; font-weight:800;
    box-shadow:0 12px 34px rgba(210,31,45,.32); }
  h1{ font-size:23px; font-weight:800; margin:0 0 12px; letter-spacing:-.01em; }
  p{ font-size:15.5px; line-height:1.6; margin:0; color:#5f584d; }
  @media (prefers-color-scheme:dark){ p{ color:#b7afa1; } }
  .sub{ margin-top:22px; font-size:12.5px; opacity:.75; }
  a{ color:inherit; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">√</div>
    <h1>Temporarily unavailable</h1>
    <p>Square Root Calendar is offline for maintenance right now. Please check back soon — your saved data stays on your device.</p>
    <p class="sub">A tool from <a href="https://nyfirestudyapp.com">NYFireStudyApp.com</a></p>
  </div>
<script>
  // Decommission the previously-installed app: unregister its service worker and
  // clear its offline caches so a cached copy can't keep running. This does NOT
  // touch localStorage — the user's tours are preserved for a future relaunch.
  (function(){
    try{
      if('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations){
        navigator.serviceWorker.getRegistrations().then(function(rs){
          rs.forEach(function(r){ try{ r.unregister(); }catch(e){} });
        }).catch(function(){});
      }
      if(window.caches && caches.keys){
        caches.keys().then(function(ks){
          ks.forEach(function(k){ try{ caches.delete(k); }catch(e){} });
        }).catch(function(){});
      }
    }catch(e){}
  })();
</script>
</body>
</html>
